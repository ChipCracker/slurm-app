name: SlurmApp
options:
  bundleIdPrefix: de.cwitzl
  deploymentTarget:
    macOS: "14.0"
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Shout:
    path: Vendor/Shout

targets:
  SlurmApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: SlurmApp
        excludes:
          - "Info.plist"
    resources:
      - path: SlurmApp/Resources
        optional: true
    dependencies:
      - package: Shout
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.cwitzl.slurmapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Slurm
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # iPhone + iPad
        TARGETED_DEVICE_FAMILY: "1,2"
        # iOS: generierter Launch-Screen + Orientierungen
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # macOS-spezifisch (auf iOS ignoriert)
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES

  SlurmAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SlurmAppTests
    dependencies:
      - target: SlurmApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.cwitzl.slurmapp.tests
        GENERATE_INFOPLIST_FILE: YES
        # Host-App ist multiplatform; Tests laufen auf macOS → macOS-Bundle-Layout.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SlurmApp.app/Contents/MacOS/SlurmApp"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  SlurmApp:
    build:
      targets:
        SlurmApp: all
        SlurmAppTests: [test]
    test:
      targets:
        - SlurmAppTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
